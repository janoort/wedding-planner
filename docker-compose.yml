version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pgcrypto"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong:
    image: kong:3.1-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: postgres
      KONG_PG_PASSWORD: postgres
      KONG_PG_DATABASE: postgres
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_LISTEN: 0.0.0.0:8000
      KONG_LISTEN_SSL: 0.0.0.0:8443
    ports:
      - "8000:8000"
      - "8443:8443"
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml
    command: ["kong", "start"]

  auth:
    image: supabase/gotrue:v2.119.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
      GOTRUE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_PASSWORD_MIN_LENGTH: 6
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000,http://localhost:3001
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: localhost
      GOTRUE_SMTP_PORT: 54321
      GOTRUE_SMTP_USER: placeholder
      GOTRUE_SMTP_PASS: placeholder
      GOTRUE_SMTP_SENDER_NAME: noreply
      GOTRUE_SENDGRID_ENABLED: "false"
      GOTRUE_TWILIO_ENABLED: "false"
    ports:
      - "9999:9999"
    command: "gotrue"

  rest:
    image: postgrest/postgrest:v12.0.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_ANON_ROLE: anon
    ports:
      - "3001:3000"

  realtime:
    image: supabase/realtime:v2.28.32
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      SLOT_NAME: realtime_dev
      SECURE_CHANNELS: "false"
      JWT_SIGNING_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
    ports:
      - "4000:4000"
    command:
      - bash
      - -c
      - "realtime"

  storage:
    image: supabase/storage-api:v0.46.4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE2ODAwMDAwMDAsImV4cCI6MTcwMDAwMDAwMH0.KLv1zOkKT8w7X_8hE9-LqlzLgvWwT4iB-l-4jO3a5IA
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY4MDAwMDAwMCwiZXhwIjoxNzAwMDAwMDAwfQ.GC7G1e3XkKJOzDNQ0-FrEYDlC5qmKJyQQmNqUdLb4Cg
      GLOBAL_S3_BUCKET: storage
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
      DATABASE_PUBLIC_URL: http://localhost:5432
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_URL: http://rest:3000
    ports:
      - "5000:5000"
    volumes:
      - storage-data:/var/lib/storage

  studio:
    image: supabase/studio:20240101-6ddf288
    depends_on:
      - postgres
    environment:
      STUDIO_PG_INTERNAL_URL: postgres://postgres:postgres@postgres:5432/postgres
      POSTGRES_PASSWORD: postgres
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:8000
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE2ODAwMDAwMDAsImV4cCI6MTcwMDAwMDAwMH0.KLv1zOkKT8w7X_8hE9-LqlzLgvWwT4iB-l-4jO3a5IA
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY4MDAwMDAwMCwiZXhwIjoxNzAwMDAwMDAwfQ.GC7G1e3XkKJOzDNQ0-FrEYDlC5qmKJyQQmNqUdLb4Cg
      LOGFLARE_ENABLED: "false"
    ports:
      - "3001:3000"

volumes:
  postgres-data:
  storage-data:
